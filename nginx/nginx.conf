server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    root /var/www/bever/index;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # BConvert Vue static files
    location = /bconvert {
        return 301 /bconvert/;
    }

    location /bconvert/ {
        alias /var/www/bever/bconvert/dist/;
        index index.html;
        try_files $uri $uri/ /bconvert/index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
